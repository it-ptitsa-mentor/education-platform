name: CI / Deploy education.*

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Гейт: тесты на каждый PR и push в main ──
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

      - name: Feature tests
        run: pnpm test:feature

  theory-rewrite-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check rewritten theory for forbidden brands
        run: |
          python3 scripts/check-theory-lesson.py --module 01-modul-1 --only-rewritten
          python3 scripts/test_check_theory_lesson.py -q

  # ── Тесты заданий: эталоны валидны, TESTS_STATUS.md актуален ──
  exercise-tests-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate exercise tests against reference solutions
        run: pnpm validate:exercise-tests

      - name: TESTS_STATUS.md is up to date
        run: git diff --exit-code exercises/TESTS_STATUS.md

  # ── Деплой на сервер: только при пуше в main и зелёных тестах ──
  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate static exercise bundle
        run: pnpm generate:static-exercises

      - name: Generate course content (theory + model)
        run: pnpm generate:course-content

      - name: Build web (server, base=/app/, live API)
        run: pnpm --filter @ptitsa/web build
        env:
          VITE_BASE_PATH: /app/
          # реальный бэкенд за nginx /api (same-origin) — серверная проверка кода
          # через vitest-runner вместо браузерных эвристик
          VITE_STATIC_API: "false"

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_DEPLOY_KEY }}

      - name: Known hosts
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" >> "$HOME/.ssh/known_hosts"

      - name: Deploy via rsync
        run: |
          rsync -az --delete \
            -e "ssh -o UserKnownHostsFile=$HOME/.ssh/known_hosts" \
            packages/web/dist/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/education.it-ptitsa-mentor.ru/app/"
          ssh -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" '
              chown -R www-data:www-data /var/www/education.it-ptitsa-mentor.ru/app
              find /var/www/education.it-ptitsa-mentor.ru/app -type d -exec chmod 755 {} \;
              find /var/www/education.it-ptitsa-mentor.ru/app -type f -exec chmod 644 {} \;
            '

      - name: Deploy API service (/opt/education-platform)
        run: |
          ssh -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" '
              set -e
              cd /opt/education-platform
              git fetch origin main -q
              git reset --hard origin/main -q
              pnpm install --frozen-lockfile
              chown -R www-data:www-data /opt/education-platform
              systemctl restart education-platform-api
              sleep 3
              curl -sf http://127.0.0.1:4100/api/health
            '

      # ── Уведомление в TG-группу ботом @it_ptitsa_bot ──
      # Пропускается, пока не заданы секреты TG_BOT_TOKEN и TG_CHAT_ID
      - name: Notify Telegram
        if: ${{ env.TG_BOT_TOKEN != '' && env.TG_CHAT_ID != '' }}
        run: |
          MSG="🚀 Влито в main и задеплоено на education.it-ptitsa-mentor.ru/app/

          ${{ github.event.head_commit.message }}

          👤 ${{ github.actor }}
          🔗 ${{ github.event.head_commit.url }}"
          curl -sS "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            -d disable_web_page_preview=true >/dev/null
