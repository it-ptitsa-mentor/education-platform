# Cache-Control headers for SPA static assets (/app/assets/)
# =============================================================================
# Файл: /etc/nginx/snippets/education-platform-cache.conf
# Include в server-блоке vhost: include /etc/nginx/snippets/education-platform-cache.conf;
# =============================================================================
#
# ТОЛЬКО ассеты. no-cache для HTML-роутов (/app/, /app/learn/...) добавляется
# ВРУЧНУЮ в location с try_files (см. Шаг 1 инструкции в PR).
#
# Почему НЕ location = /app/index.html?
# ──────────────────────────────────────
# /app/, /app/learn/... отдают index.html через try_files-фолбэк.
# exact-match location = /app/index.html срабатывает только если nginx
# переоценивает локейшны после internal-redirect — это не гарантировано
# для всех конфигураций. Заголовок нужно вешать прямо в location,
# который реально отдаёт фолбэк (тот, где try_files).
#
# Почему НЕ дублируются заголовки на ассеты?
# ────────────────────────────────────────────
# Вероятная причина дублей сейчас: vhost содержит expires 30d; (→ max-age=2592000)
# И add_header Cache-Control "public, max-age=2592000" always; одновременно.
#   expires off;    — убивает max-age, сгенерированный директивой expires
#   add_header (собственный в location) — блокирует наследование родительского
#                    add_header Cache-Control из server/http блока
#   Итог: ровно ОДИН заголовок Cache-Control от нашего add_header.
#
# ВАЖНО: expires off сам по себе НЕ убирает чужой add_header.
#        Именно пара (expires off + собственный add_header) даёт гарантию.

# Vite-хешированные ассеты — кешировать навсегда.
# Хеш в имени файла (index-AbCd1234.js) меняется при каждой сборке Vite,
# старый файл никогда не запросится, поэтому immutable безопасен.
location ^~ /app/assets/ {
    expires off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}
