# Cache-Control headers for SPA static files
# Deployed automatically via CI to /etc/nginx/snippets/education-platform-cache.conf
# Included in /etc/nginx/sites-available/education.it-ptitsa-mentor.ru
#
# Two rules:
#   1. index.html — no-cache: браузер ВСЕГДА ревалидирует, получает свежую ссылку
#      на актуальный хешированный бандл после каждого деплоя.
#   2. /app/assets/* — immutable: хеш в имени файла меняется при каждой сборке Vite,
#      поэтому кешируем вечно — экономим трафик и ускоряем загрузку.

# Exact match: index.html — entry-point SPA, никогда не кешировать
location = /app/index.html {
    expires off;
    add_header Cache-Control "no-cache" always;
}

# Prefix match: Vite-хешированные ассеты — кешировать навсегда
location ^~ /app/assets/ {
    expires off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}
