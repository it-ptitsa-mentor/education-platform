# Nginx location block for Education Platform API
# Include this in the server block for education.it-ptitsa-mentor.ru
# Usage: include /etc/nginx/snippets/education-platform-api.conf;

location /api/ {
    proxy_pass         http://127.0.0.1:4100/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;
}
