# Optional: deploy API separately (GitHub Pages serves static web only).
# Connect repo at https://dashboard.render.com → New Blueprint
services:
  - type: web
    name: education-platform-api
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @ptitsa/api build
    startCommand: node packages/api/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
