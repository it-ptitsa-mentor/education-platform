<div class="row">
  <div class="col">
    <h3>Lists</h3>
    <form class="d-flex mb-2" data-container="new-list-form">
      <label for="new-list-name" class="visually-hidden">New list name</label>
      <input type="text" id="new-list-name" class="form-control me-2" name="name" required />
      <input type="submit" class="btn btn-primary" value="Add List" />
    </form>
    <div data-container="lists"></div>
  </div>
  <div class="col">
    <h3>Tasks</h3>
    <form class="d-flex mb-2" data-container="new-task-form">
      <label for="new-task-name" class="visually-hidden">New task name</label>
      <input type="text" id="new-task-name" class="form-control me-2" name="name" required />
      <input type="submit" class="btn btn-primary" value="Add Task" />
    </form>
    <div data-container="tasks"></div>
  </div>
</div>
